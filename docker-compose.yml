version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fairshare-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fairshare_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: fairshare-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgres://postgres:password@db:5432/fairshare_dev
      - JWT_SECRET=super_secret_session_key_fairshare_ai_2026
      - - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db

volumes:
  pgdata:
