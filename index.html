<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>FairShare Ai </title>
    <meta name="description" content="FairShare is a smart group expense tracker that splits bills fairly. Use AI to parse expenses, scan receipts, and settle debts instantly with UPI/GPay integration." />
    <meta name="keywords" content="expense splitter, bill sharing app, group expenses, split bills, fairshare, trip expense tracker, settle debts, UPI payment, AI expense parser" />
    <meta name="author" content="FairShare" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fairshare.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fairshare.app/" />
    <meta property="og:title" content="FairShare — Intelligent Group Expense Splitter" />
    <meta property="og:description" content="Split bills with friends effortlessly. AI-powered expense parsing, receipt scanning, and instant UPI settlements. No more awkward money conversations." />
    <meta property="og:image" content="https://fairshare.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="FairShare" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://fairshare.app/" />
    <meta name="twitter:title" content="FairShare — Intelligent Group Expense Splitter" />
    <meta name="twitter:description" content="Split bills with friends effortlessly. AI-powered expense parsing, receipt scanning, and instant UPI settlements." />
    <meta name="twitter:image" content="https://fairshare.app/og-image.png" />

    <!-- Theme & App -->
    <meta name="theme-color" content="#163300" />
    <meta name="application-name" content="FairShare" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FairShare" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FairShare",
      "url": "https://fairshare.app",
      "description": "Intelligent group expense splitter with AI parsing, receipt scanning, and UPI payment integration.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered expense parsing",
        "Receipt scanning with OCR",
        "Group expense tracking",
        "UPI / GPay payment integration",
        "Debt simplification algorithm",
        "Real-time group chat"
      ]
    }
    </script>

    <div id="root"></div>
