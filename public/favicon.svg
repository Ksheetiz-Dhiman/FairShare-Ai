<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark green rounded square background -->
  <rect width="64" height="64" rx="14" fill="#163300"/>
  <!-- Lime voltage circle -->
  <circle cx="32" cy="36" r="18" fill="#9fe870"/>
  <!-- Bold F lettermark -->
  <text
    x="32" y="47"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#163300"
    text-anchor="middle"
  >F</text>
  <!-- Small coin accent dot top-right -->
  <circle cx="44" cy="16" r="7" fill="#9fe870" opacity="0.95"/>
  <text
    x="44" y="20"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="8"
    fill="#163300"
    text-anchor="middle"
  >₹</text>
</svg>
